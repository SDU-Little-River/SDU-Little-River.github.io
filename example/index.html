<pre><code class="hljs">    .shell &#123;
        width: 100%;
        position: relative;
        padding: 80px 0;
        background-attachment: fixed;
        background-size: cover;
    &#125;

    .shell:before &#123;
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(99, 99, 99, 0.8);
        content: &quot;&quot;;
    &#125;

    .header &#123;
        width: 100%;
        text-align: center;
        margin-bottom: 80px;
        position: relative;
    &#125;

    .title &#123;
        color: #fff;
        font-size: 46px;
        font-weight: normal;
        margin: 0;
    &#125;

    .timeline &#123;
        display: flex;
        margin: 0 auto;
        flex-wrap: wrap;
        flex-direction: column;
        max-width: 700px;
        position: relative;
    &#125;

    .content-title &#123;
        font-weight: normal;
        font-size: 66px;
        margin: -10px 0 0 0;
        transition: 0.4s;
        padding: 0 10px;
        box-sizing: border-box;
        color: #fff;
    &#125;

    .content-desc &#123;
        margin: 0;
        font-size: 15px;
        box-sizing: border-box;
        color: rgba(255, 255, 255, 0.7);
        line-height: 25px;
    &#125;

    .timeline:before &#123;
        position: absolute;
        left: 50%;
        width: 2px;
        height: 100%;
        margin-left: -1px;
        content: &quot;&quot;;
        background: rgba(255, 255, 255, 0.07);
    &#125;

    .item &#123;
        padding: 40px 0;
        opacity: 0.3;
        filter: blur(2px);
        transition: 0.5s;
        box-sizing: border-box;
        width: calc(50% - 40px);
        display: flex;
        position: relative;
        transform: translateY(-80px);
    &#125;

    .item:before &#123;
        /* 设置在伪元素before中的内容  */
        content: attr(data-text);
        letter-spacing: 3px;
        width: 100%;
        position: absolute;
        color: rgba(255, 255, 255, 0.5);
        font-size: 13px;
        border-left: 2px solid rgba(255, 255, 255, 0.5);
        top: 70%;
        margin-top: -5px;
        padding-left: 15px;
        opacity: 0;
        right: calc(-100% - 56px);
        font: 900 20px &#39;&#39;;
        letter-spacing: 5px;
    &#125;

    .item:nth-child(even) &#123;
        align-self: flex-end;
    &#125;

    .item:nth-child(even):before &#123;
        right: auto;
        text-align: right;
        left: calc(-100% - 56px);
        padding-left: 0;
        border-left: none;
        border-right: 2px solid rgba(255, 255, 255, 0.5);
        padding-right: 15px;
    &#125;

    .item--active &#123;
        opacity: 1;
        transform: translateY(0);
        filter: blur(0px);
    &#125;

    .item--active:before &#123;
        top: 50%;
        transition: 0.3s all 0.2s;
        opacity: 1;
    &#125;

    .item--active .content-title &#123;
        margin: -50px 0 20px 0;
    &#125;

    .img &#123;
        max-width: 100%;
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.4);
    &#125;

    .subtitle &#123;
        color: rgba(255, 255, 255, 0.5);
        font-size: 16px;
        letter-spacing: 5px;
        margin: 10px 0 0 0;
        font-weight: normal;
    &#125;

    .footer &#123;
        padding: 95px 0;
        text-align: center;
    &#125;

    .footer a &#123;
        color: #999;
        display: inline-block;
    &#125;

    @media only screen and (max-width: 767px) &#123;
        .item &#123;
            align-self: baseline !important;
            width: 100%;
            padding: 0 30px 150px 80px;
        &#125;

        .item:before &#123;
            left: 10px !important;
            padding: 0 !important;
            top: 50px;
            text-align: center !important;
            width: 60px;
            border: none !important;
        &#125;

        .item:last-child &#123;
            padding-bottom: 40px;
        &#125;
    &#125;

    @media only screen and (max-width: 767px) &#123;
        .timeline:before &#123;
            left: 40px;
        &#125;
    &#125;
&lt;/style&gt;

<pre><code class="hljs">&lt;div class=&quot;shell&quot; id=&quot;shell&quot;&gt;
    &lt;div class=&quot;header&quot;&gt;
        &lt;h2 class=&quot;title&quot;&gt;山羊の前端小窝&lt;/h2&gt;
        &lt;h3 class=&quot;subtitle&quot;&gt;BILIBILI&lt;/h3&gt;
    &lt;/div&gt;
    &lt;div class=&quot;timeline&quot;&gt;


        &lt;div class=&quot;item&quot; data-text=&quot;《舞！舞！舞！》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/01.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2001&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    你要做一个不动声色的大人了。不准情绪化，不准偷偷想念，不准回头看。去过自己另外的生活。你要听话，不是所有的鱼都会生活在同一片海里。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《你的孤独，虽败犹荣》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/02.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2002&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    如果你停止，就是谷底。如果你还在继续，
                    就是上坡。这是我听过关于人生低谷最好的阐述。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《萤火之森》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/03.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2003&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    如果时光可以倒流，我还是会选择认识你，虽然会伤痕累累，但是心中的温暖记忆是谁都无法给予的。谢谢你来过我的世界。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《红玫瑰与白玫瑰》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/04.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2004&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    娶了红玫瑰，久而久之，红玫瑰就变成了墙上的一抹蚊子血，白玫瑰还是“床前明月光； 娶了白玫瑰，白玫瑰就是衣服上的一粒饭渣子，红的还是心口上的一颗朱砂痣。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《小王子》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/05.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2005&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    如果你爱上了某个星球的一朵花。那么，只要在夜晚仰望星空，就会觉得漫天的繁星就像一朵朵盛开的花。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《平凡的世界》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/06.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2006&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    人生啊，是这样不可预测，没有永恒的痛苦，也没有永恒的幸福，生活像流水一般，有时是那么平展，有时又是那么曲折。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《银魂》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/07.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2007&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    人生，就像肥皂泡一样。风一吹就呼呼的飞上了天，注意到的时候，却啪地一下消失了。就在即将破裂的瞬间，想要自己飞得更高。但回过神来的时候，却总是来不及。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《小说灯笼》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/08.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2008&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    日子只能一天一天好好地过，别无他法。别烦恼明天的事，明天的烦恼让明天去烦吧。我只想开心、努力、温柔待人地过完今天一天。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《蓝，另一种蓝》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/09.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2009&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    人有的时候真的是奇怪 ，选择了的会后悔，放弃了的会遗憾，但完美只能是一种理想，而不可能是一种存在。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《道林・格雷的画像》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/10.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2010&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    不要虚掷你的黄金时代，不要去倾听枯燥乏味的东西，不要设法挽留无望的失败，不要把你的生命献给无知、平庸和低俗。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《银魂》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/17.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2017&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    人生，就像肥皂泡一样。风一吹就呼呼的飞上了天，注意到的时候，却啪地一下消失了。就在即将破裂的瞬间，想要自己飞得更高。但回过神来的时候，却总是来不及。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《小说灯笼》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/18.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2018&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    日子只能一天一天好好地过，别无他法。别烦恼明天的事，明天的烦恼让明天去烦吧。我只想开心、努力、温柔待人地过完今天一天。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《蓝，另一种蓝》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/19.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2019&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    人有的时候真的是奇怪 ，选择了的会后悔，放弃了的会遗憾，但完美只能是一种理想，而不可能是一种存在。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《道林・格雷的画像》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/20.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2020&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    不要虚掷你的黄金时代，不要去倾听枯燥乏味的东西，不要设法挽留无望的失败，不要把你的生命献给无知、平庸和低俗。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《舞！舞！舞！》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/21.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2021&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    你要做一个不动声色的大人了。不准情绪化，不准偷偷想念，不准回头看。去过自己另外的生活。你要听话，不是所有的鱼都会生活在同一片海里。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;item&quot; data-text=&quot;《你的孤独，虽败犹荣》&quot;&gt;
            &lt;div class=&quot;content&quot;&gt;
                &lt;img class=&quot;img&quot; src=&quot;./img/22.jpg&quot; /&gt;
                &lt;h2 class=&quot;content-title&quot;&gt;2022&lt;/h2&gt;
                &lt;p class=&quot;content-desc&quot;&gt;
                    如果你停止，就是谷底。如果你还在继续，就是上坡。这是我听过关于人生低谷最好的阐述。
                &lt;/p&gt;
            &lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
    (function ($) &#123;
        $.fn.timeline = function () &#123;
            var selectors = &#123;
                id: $(this),
                item: $(this).find(&quot;.item&quot;),
                activeClass: &quot;item--active&quot;,
                img: &quot;.img&quot;
            &#125;;
            // 将第一个时间轴项目激活，并设置时间轴背景图片为第一个项目的图片
            selectors.item.eq(0).addClass(selectors.activeClass);
            selectors.id.css(
                &quot;background-image&quot;,
                &quot;url(&quot; +
                selectors.item
                    .first()
                    .find(selectors.img)
                    .attr(&quot;src&quot;) +
                &quot;)&quot;
            );
            // 获取时间轴项目的总数
            var itemLength = selectors.item.length;
            // 当页面滚动时，触发滚动事件
            $(window).scroll(function () &#123;
                var max, min;
                // 获取页面滚动的距离
                var pos = $(this).scrollTop();
                selectors.item.each(function (i) &#123;
                    // 获取当前时间轴项目的最小和最大高度
                    min = $(this).offset().top;
                    max = $(this).height() + $(this).offset().top;
                    var that = $(this);
                    // 如果滚动到最后一个项目，并且超过了当前项目高度的一半，
                    // 则将最后一个项目设置为激活状态，并设置背景图片为最后一个项目的图片
                    if (i == itemLength - 2 &amp;&amp; pos &gt; min + $(this).height() / 2) &#123;
                        selectors.item.removeClass(selectors.activeClass);
                        selectors.id.css(
                            &quot;background-image&quot;,
                            &quot;url(&quot; +
                            selectors.item
                                .last()
                                .find(selectors.img)
                                .attr(&quot;src&quot;) +
                            &quot;)&quot;
                        );
                        selectors.item.last().addClass(selectors.activeClass);
                    &#125;
                    // 如果当前滚动位置在当前项目的最小和最大高度之间，
                    // 则将当前项目设置为激活状态，并设置背景图片为当前项目的图片
                    else if (pos &lt;= max - 10 &amp;&amp; pos &gt;= min) &#123;
                        selectors.id.css(
                            &quot;background-image&quot;,
                            &quot;url(&quot; +
                            $(this)
                                .find(selectors.img)
                                .attr(&quot;src&quot;) +
                            &quot;)&quot;
                        );
                        selectors.item.removeClass(selectors.activeClass);
                        $(this).addClass(selectors.activeClass);
                    &#125;
                &#125;);
            &#125;);
        &#125;;
    &#125;)(jQuery)
    /*
    最后，我们调用 timeline 插件并传入时间轴的 ID 作为参数。
    这将启用时间轴插件并为该时间轴绑定滚动事件。
    */
    $(&quot;#shell&quot;).timeline();
&lt;/script&gt;
